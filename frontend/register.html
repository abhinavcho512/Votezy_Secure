<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register - Online Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/styles.css"/>
    <!-- ✅ Load FIRST so BASE_URL is available -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(to right, #8b0000, #f8caca)">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Online Voting</a>
    </div>
</nav>

<!-- Register Form -->
<div class="container mt-5">
    <h2 class="text-center text-danger">Register</h2>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required/>
                </div>

                <button onclick="register()" class="btn btn-danger w-100">
                    Register
                </button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="login.html" class="text-danger">Login</a>
                </p>

            </div>
        </div>
    </div>
</div>

<script>
function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
        Swal.fire("Warning", "Please fill all fields", "warning");
        return;
    }

    fetch(`${BASE_URL}/api/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name,
            email,
            password,
            role: "ROLE_USER"
        })
    })
    .then(res => res.text())
    .then(data => {
        Swal.fire("Success", "Registered successfully! Please login.", "success")
        .then(() => {
            window.location.href = "login.html";
        });
    })
    .catch(() => Swal.fire("Error", "Registration failed", "error"));
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
