<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cast Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(to right, #8b0000, #f8caca)">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Online Voting</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item">
                    <a class="nav-link" href="voters.html">Voters</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="candidates.html">Candidates</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="voting.html">Voting</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="results.html">Results</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Voting Form -->
<div class="container mt-5">
    <h2 class="text-center text-danger">Vote for a Candidate</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">

                <div class="mb-3">
                    <label class="form-label">Your Voter ID</label>
                    <input type="number" id="voterId" class="form-control" required/>
                </div>

                <!-- ✅ NEW: Election Name field -->
                <div class="mb-3">
                    <label class="form-label">Election Name</label>
                    <input type="text" id="electionName" class="form-control"
                           placeholder="e.g. General2024" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Candidate</label>
                    <select id="candidateSelect" class="form-select" required></select>
                </div>

                <button type="button" onclick="castVote()" class="btn btn-danger w-100">
                    Cast Vote
                </button>

            </div>
        </div>
    </div>

    <!-- Votes Table -->
    <h3 class="text-center mt-4">All Votes Casted</h3>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Voter ID</th>
                <th>Candidate ID</th>
            </tr>
        </thead>
        <tbody id="votesTable"></tbody>
    </table>
</div>

<!-- JS -->
<script src="assets/js/config.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/voting.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
