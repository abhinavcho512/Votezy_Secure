<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Online Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/styles.css"/>
    <!-- ✅ Load FIRST so BASE_URL is available -->
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(to right, #8b0000, #f8caca)">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Online Voting</a>
    </div>
</nav>

<!-- Login Form -->
<div class="container mt-5">
    <h2 class="text-center text-danger">Login</h2>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required/>
                </div>

                <button onclick="login()" class="btn btn-danger w-100">
                    Login
                </button>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="register.html" class="text-danger">Register</a>
                </p>

            </div>
        </div>
    </div>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        Swal.fire("Warning", "Please enter email and password", "warning");
        return;
    }

    fetch(`${BASE_URL}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.token) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);
            localStorage.setItem("email", data.email);

            Swal.fire("Success", "Login successful!", "success").then(() => {
                if (data.role === "ROLE_ADMIN") {
                    window.location.href = "index.html";
                } else {
                    window.location.href = "voting.html";
                }
            });
        } else {
            Swal.fire("Error", "Invalid credentials", "error");
        }
    })
    .catch(() => Swal.fire("Error", "Login failed", "error"));
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
