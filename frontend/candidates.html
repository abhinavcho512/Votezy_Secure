<!-- Candidate Registration Form -->
<div class="container mt-5">
	<h2 class="text-center text-danger">Register a Candidate</h2>

	<div class="row justify-content-center">
		<div class="col-md-6">
			<div class="card shadow-lg p-4">

				<form id="candidateForm">

					<div class="mb-3">
						<label class="form-label">Candidate Name</label>
						<input type="text" id="candidateName" class="form-control" required/>
					</div>

					<div class="mb-3">
						<label class="form-label">Party</label>
						<input type="text" id="party" class="form-control" required/>
					</div>

					<button type="submit" class="btn btn-danger w-100">
						Register
					</button>

				</form>

			</div>
		</div>
	</div>
</div>

<!-- Candidate List Table -->
<div class="container mt-5">
	<h3 class="text-center text-danger">Registered Candidates</h3>

	<table class="table table-bordered">
		<thead class="table-dark">
			<tr>
				<th>Candidate ID</th>
				<th>Name</th>
				<th>Party</th>
				<th>Actions</th>
			</tr>
		</thead>

		<tbody id="candidatesContainer"></tbody>
	</table>
</div>
